<section class="min-h-screen bg-slate-100 py-6" aria-labelledby="wishlist-title">
  <div class="mx-auto max-w-[1000px] px-4 sm:px-6 lg:px-8">
    <div class="mb-5 flex items-center gap-2 text-xs text-slate-500">
      <a routerLink="/" class="transition hover:text-slate-700">Home</a>
      <span>/</span>
      <span class="font-semibold text-slate-800">Wishlist</span>
    </div>

    <main class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
      <header class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 id="wishlist-title" class="text-3xl font-bold tracking-tight text-slate-900">My Wishlist</h1>
          <p class="mt-1 text-sm text-slate-500">Saved items for later purchase.</p>
        </div>

        @if (hasItems()) {
          <button
            type="button"
            (click)="clearWishlist()"
            class="cursor-pointer rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-xs font-semibold text-red-700 transition hover:bg-red-100">
            Clear Wishlist
          </button>
        }
      </header>

      @if (!hasItems()) {
        <div class="rounded-xl border border-slate-200 bg-slate-50 p-12 text-center">
          <p class="text-sm text-slate-600">Your wishlist is empty.</p>
          <a
            routerLink="/products"
            class="mt-4 inline-flex rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
            Explore products
          </a>
        </div>
      } @else {
        <div class="space-y-4">
          @for (item of wishlistItems(); track item._id) {
            <article class="grid gap-4 rounded-xl border border-slate-200 p-4 sm:grid-cols-[110px_minmax(0,1fr)_auto] sm:items-center">
              <a [routerLink]="['/products', item.slug || item._id]" class="overflow-hidden rounded-lg border border-slate-200 bg-slate-100">
                <img [src]="productImage(item.imageUrl)" [alt]="item.name" class="h-[90px] w-full object-cover sm:h-[80px]" loading="lazy" />
              </a>

              <div>
                <a [routerLink]="['/products', item.slug || item._id]" class="text-base font-semibold text-slate-900 transition hover:text-blue-700">
                  {{ item.name }}
                </a>
                <p class="mt-1 text-xs text-slate-500">{{ item.category || 'General' }}</p>
                <p class="mt-2 text-lg font-bold text-slate-900">${{ item.price | number: '1.2-2' }}</p>
              </div>

              <button
                type="button"
                (click)="removeItem(item._id)"
                class="cursor-pointer rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-semibold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50">
                Remove
              </button>
            </article>
          }
        </div>
      }
    </main>
  </div>
</section>
