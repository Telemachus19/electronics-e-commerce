<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img"
    aria-labelledby="title desc">
    <title id="title">Product image placeholder</title>
    <desc id="desc">A neutral placeholder image shown when a product image is not available.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#e2e8f0" />
            <stop offset="100%" stop-color="#cbd5e1" />
        </linearGradient>
    </defs>
    <rect width="1200" height="800" fill="url(#bg)" />
    <g fill="none" stroke="#64748b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.85">
        <rect x="300" y="190" width="600" height="420" rx="28" />
        <path d="M360 520l135-145 110 95 120-125 115 120" />
        <circle cx="470" cy="320" r="38" />
    </g>
</svg>